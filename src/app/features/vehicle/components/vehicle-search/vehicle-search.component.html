<div class="search-panel">
  <h2 class="panel-title">Vehicle Search</h2>

  <!-- Search by Criteria -->
  <div class="search-section">
    <div class="form-row">
      <div class="form-group">
        <label for="year">Year</label>
        <select
          id="year"
          [(ngModel)]="selectedYear"
          (change)="onYearChange()"
          [disabled]="loading"
          class="form-control"
        >
          <option [ngValue]="null">Select Year</option>
          <option *ngFor="let year of years" [ngValue]="year">{{ year }}</option>
        </select>
      </div>

      <div class="form-group">
        <label for="make">Make</label>
        <select
          id="make"
          [(ngModel)]="selectedMake"
          (change)="onMakeChange()"
          [disabled]="loading"
          class="form-control"
        >
          <option value="">Select Make</option>
          <option *ngFor="let make of makes" [value]="make.name">
            {{ make.name }}
          </option>
        </select>
      </div>

      <div class="form-group">
        <label for="model">Model</label>
        <select
          id="model"
          [(ngModel)]="selectedModel"
          (change)="onModelChange()"
          [disabled]="loading || !selectedMake"
          class="form-control"
        >
          <option value="">Select Model</option>
          <option *ngFor="let model of filteredModels" [value]="model.name">
            {{ model.name }}
          </option>
        </select>
      </div>
    </div>

    <div class="button-row">
      <button
        class="btn btn-primary"
        (click)="searchByCriteria()"
        [disabled]="loading || !selectedYear || !selectedMake || !selectedModel"
      >
        <span *ngIf="!loading">Search</span>
        <span *ngIf="loading">Searching...</span>
      </button>
      <button
        class="btn btn-secondary"
        (click)="clearSearch()"
        [disabled]="loading"
      >
        Clear
      </button>
    </div>
  </div>

  <!-- Divider -->
  <div class="divider">
    <span class="divider-text">OR</span>
  </div>

  <!-- Search by VIN -->
  <div class="search-section">
    <div class="form-group">
      <label for="vin">VIN (17 characters)</label>
      <div class="vin-input-group">
        <input
          id="vin"
          type="text"
          [(ngModel)]="vinInput"
          (keypress)="onVinKeyPress($event)"
          [disabled]="loading"
          maxlength="17"
          placeholder="Enter VIN"
          class="form-control"
        />
        <button
          class="btn btn-primary"
          (click)="searchByVin()"
          [disabled]="loading || !vinInput"
        >
          <span *ngIf="!loading">Search</span>
          <span *ngIf="loading">Searching...</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Error Message -->
  <div *ngIf="errorMessage" class="error-message">
    <span class="error-icon">⚠</span>
    <span>{{ errorMessage }}</span>
  </div>

  <!-- Loading Indicator -->
  <div *ngIf="loading" class="loading-indicator">
    <div class="spinner"></div>
    <span>Loading vehicle data...</span>
  </div>
</div>
